llm:
  providers:
    openrouter:
      base_url: https://openrouter.ai/api/v1
      api_key: ${OPENROUTER_API_KEY}
    # vastai:
    #   base_url: ${VASTAI_BASE_URL}
    #   api_key: ${VASTAI_API_KEY}
  models:
    planner: openrouter/deepseek/deepseek-chat-v3-0324      # good reasoning, cheap
    implementer: openrouter/deepseek/deepseek-chat-v3-0324   # strong at code gen
    validator: openrouter/google/gemini-2.0-flash-001        # fast, cheap for
    diagnoser: openrouter/deepseek/deepseek-chat-v3-0324     # needs reasoning
    reviewer: openrouter/google/gemini-2.0-flash-001

pipeline:
  max_cycles: 5
  loop_detection_window: 5
  tool_output_truncation: 3000
  context_char_limit: 40000
  context_truncation_strategy: middle
  test_command: null  # override auto-detection; null = let planner/auto-detect decide
  test_timeout: 120

workspace:
  # Relative paths for local dev. Docker/K8s configs use absolute paths
  # (e.g., /workspace/runs, /workspace/target)
  base_path: ./runs
  target_repo: ./target

logging:
  level: INFO
  structured: true
  events:
    - CYCLE_START
    - TOOL_CALL_START
    - TOOL_CALL_END
    - NODE_ENTER
    - NODE_EXIT
    - CONVERGENCE
    - LOOP_DETECTED
